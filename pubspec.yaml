name: hulak_ko_chitthi
description: A messaging app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Image picking
  image_picker: ^1.1.2

  # Image compression & resizing (Fixes avatar upload failure)
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/Pigeon.png
    - assets/images/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#2C1A0E"
  adaptive_icon_foreground: "assets/images/icon.png"
  adaptive_icon_padding: false
  min_sdk_android: 21